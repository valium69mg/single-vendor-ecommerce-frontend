user nginx;
worker_processes auto;
error_log  /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /dev/stdout main;

  # ── Performance ──────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;

  # ── Gzip compression ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json
             application/javascript application/xml+rss
             application/atom+xml image/svg+xml;

  # ── Rate limiting zones ──────────────────────────────────────────────────
  # General: 20 req/s per IP
  limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
  # API: 10 req/s per IP (stricter)
  limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
  # Login/auth: 5 req/min (very strict)
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;

  limit_req_status 429;

  # ── Connection limiting ───────────────────────────────────────────────────
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Hide Nginx version
    server_tokens off;

    # ── Connection limit ───────────────────────────────────────────────────
    limit_conn conn_limit 50;

    # ── General API proxy ──────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;

      # Don't pass cookies upstream unless needed
      proxy_pass_header  Set-Cookie;
    }

    # ── Static assets (aggressive caching) ────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
      limit_req zone=general burst=50 nodelay;
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
      limit_req zone=general burst=30 nodelay;
      try_files $uri $uri/ /index.html;

      # Don't cache the HTML entry point
      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
      }
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Block common attack paths ──────────────────────────────────────────
    location ~* \.(env|git|sh|sql|bak|config)$ {
      deny all;
      return 404;
    }

    # ── Custom error pages ─────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 429              /429.html;
    error_page 500 502 503 504  /50x.html;

    location = /50x.html { root /usr/share/nginx/html; internal; }
    location = /429.html { root /usr/share/nginx/html; internal; }
  }
}